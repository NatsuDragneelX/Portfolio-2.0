<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 225" fill="none">
  <defs>
    <linearGradient id="sbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="hsl(160, 35%, 12%)"/>
      <stop offset="100%" stop-color="hsl(222, 35%, 8%)"/>
    </linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#sbg)"/>
  <g transform="translate(72, 36)">
    <rect width="256" height="153" rx="8" fill="hsl(222 25% 8% / 0.85)" stroke="hsl(160 50% 40% / 0.35)" stroke-width="2"/>
    <!-- grid dots -->
    <g fill="hsl(220 15% 22%)">
      <circle cx="16" cy="16" r="3"/><circle cx="40" cy="16" r="3"/><circle cx="64" cy="16" r="3"/><circle cx="88" cy="16" r="3"/>
      <circle cx="16" cy="40" r="3"/><circle cx="40" cy="40" r="3"/><circle cx="64" cy="40" r="3"/><circle cx="88" cy="40" r="3"/>
      <circle cx="16" cy="64" r="3"/><circle cx="40" cy="64" r="3"/><circle cx="64" cy="64" r="3"/><circle cx="88" cy="64" r="3"/>
    </g>
    <!-- snake -->
    <rect x="136" y="88" width="14" height="14" rx="3" fill="hsl(160 65% 42%)"/>
    <rect x="120" y="88" width="14" height="14" rx="3" fill="hsl(160 55% 36%)"/>
    <rect x="104" y="88" width="14" height="14" rx="3" fill="hsl(160 50% 32%)"/>
    <rect x="104" y="72" width="14" height="14" rx="3" fill="hsl(160 70% 48%)" stroke="hsl(160 80% 55%)" stroke-width="1"/>
    <!-- food -->
    <rect x="200" y="56" width="12" height="12" rx="2" fill="hsl(35 90% 52%)"/>
  </g>
  <text x="388" y="218" text-anchor="end" fill="hsl(220 12% 55%)" font-family="system-ui,sans-serif" font-size="11">Snake</text>
</svg>
